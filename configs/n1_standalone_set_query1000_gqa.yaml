model:
  name: /scratch/prj/nmes_simeone/xty_hf_models/llava-1.5-7b-hf-local
  cache_dir: /scratch/prj/nmes_simeone/xty_hf_models
  local_files_only: true
  dtype: float16
  device: cuda
  device_map: auto
  layer_idx: 12

data:
  train_jsonl: data/gqa_train1000.jsonl
  test_jsonl: data/gqa_test300.jsonl
  image_root: ""
  max_samples: 1000

corruption:
  mode: erasure
  drop_ratio: 0.5
  mask_value: zero
  seed: 42

oracle:
  target: teacher_kl
  max_candidates_per_sample: 576
  candidate_chunk_size: 16
  save_dir: outputs/oracle_cache/gqa_teacher_train1000_fullcand

scorer:
  type: set_query
  aux_mode: norm_stats
  pos_fourier_bands: 0
  hidden_dim: 4096
  proj_dim: 256
  aux_dim: 5
  d_model: 256
  nhead: 4
  layers: 1
  hidden1: 128
  dropout: 0.1

train:
  epochs: 5
  lr: 1.0e-4
  weight_decay: 1.0e-4
  pairs_per_sample: 2048
  rank_loss: pairwise
  list_loss_weight: 0.0
  list_loss_tau: 1.0
  list_loss_normalize_by_candidates: true
  grad_clip: 1.0
  checkpoint_path: outputs/checkpoints/n1_standalone_set_query1000_gqa.pt

eval:
  metric: teacher_kl
  budgets: [16, 32, 64]
