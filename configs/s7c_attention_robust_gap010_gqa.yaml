model:
  name: /scratch/prj/nmes_simeone/xty_hf_models/llava-1.5-7b-hf-local
  cache_dir: /scratch/prj/nmes_simeone/xty_hf_models
  local_files_only: true
  dtype: float16
  device: cuda
  device_map: auto
  attn_implementation: eager
  layer_idx: 12

data:
  train_jsonl: data/gqa_train1000.jsonl
  test_jsonl: data/gqa_test300.jsonl
  image_root: ""
  max_samples: 1000

corruption:
  mode: erasure
  drop_ratio: 0.5
  mask_value: zero
  seed: 42

oracle:
  target: teacher_kl
  max_candidates_per_sample: 576
  candidate_chunk_size: 16
  save_dir: outputs/oracle_cache/gqa_teacher_train500_fullcand_attn_l2_l4_l8_l12

scorer:
  type: mlp
  aux_mode: norm_attn
  attention_layers: [2, 4, 8, 12]
  pos_fourier_bands: 0
  hidden_dim: 4096
  aux_dim: 20
  hidden1: 1024
  hidden2: 256
  dropout: 0.1

train:
  epochs: 5
  lr: 1.0e-4
  weight_decay: 1.0e-4
  pairs_per_sample: 4096
  rank_loss: robust_pairwise
  robust_gap_frac: 0.10
  list_loss_weight: 0.005
  list_loss_tau: 1.0
  list_loss_normalize_by_candidates: true
  grad_clip: 1.0
  checkpoint_path: outputs/checkpoints/s7c_attention_robust_gap010_gqa.pt

eval:
  metric: teacher_kl
  budgets: [16, 32, 64]
