model:
  name: /scratch/prj/nmes_simeone/xty_hf_models/llava-1.5-7b-hf-local
  cache_dir: /scratch/prj/nmes_simeone/xty_hf_models
  local_files_only: true
  dtype: float16
  device: cuda
  device_map: auto
  attn_implementation: eager
  layer_idx: 12

data:
  train_jsonl: data/gqa_train1000.jsonl
  test_jsonl: data/gqa_test300.jsonl
  image_root: ""
  max_samples: 1000

corruption:
  mode: erasure
  drop_ratio: 0.5
  mask_value: zero
  seed: 42

oracle:
  target: teacher_kl
  max_candidates_per_sample: 576
  candidate_chunk_size: 16
  save_dir: outputs/oracle_cache/gqa_teacher_train500_fullcand_attn_l2_l4_l8_l12

experts:
  legacy_config: configs/s5_fullcand_weak_listwise_005_gqa.yaml
  legacy_checkpoint: outputs/checkpoints/s5_fullcand_weak_listwise_005_gqa.pt
  query_config: configs/h1a_fullcand_query_pairwise_gqa_1000.yaml
  query_checkpoint: outputs/checkpoints/h1a_fullcand_query_pairwise_gqa_1000.pt
  coverage_config: configs/s7c_attention_robust_gap010_gqa.yaml
  coverage_checkpoint: outputs/checkpoints/s7c_attention_robust_gap010_gqa.pt

set_scorer:
  type: residual_set
  hidden_dim: 4096
  aux_dim: 20
  d_model: 256
  nhead: 4
  layers: 1
  dropout: 0.1
  delta_scale: 0.1
  base_expert_by_budget:
    16: query
    32: legacy
    64: coverage

train:
  epochs: 5
  lr: 3.0e-4
  weight_decay: 1.0e-4
  pairs_per_sample: 2048
  boundary_pairs_per_sample: 1024
  boundary_negative_multiplier: 2
  boundary_loss_weights:
    16: 0.02
    32: 0.02
    64: 0.01
  delta_l2_weight: 0.001
  grad_clip: 1.0
  checkpoint_path: outputs/checkpoints/h6a_residual_set_gqa.pt

eval:
  metric: teacher_kl
  budgets: [16, 32, 64]
